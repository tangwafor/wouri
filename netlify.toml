# Wouri console on Netlify (monorepo). Netlify reads this from the repo root; base
# sends the build into apps/console where the Next app and its build script live.
# The Next adapter plugin bundles the SSR functions and sets the publish dir.
# No em-dashes.
[build]
  base = "apps/console"
  command = "npm run build"

# The Next build OOMs on the default heap (exit code 2). Raise it.
[build.environment]
  NODE_OPTIONS = "--max-old-space-size=4096"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
