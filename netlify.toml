# Wouri console on Netlify (monorepo, git continuous deployment). Netlify reads
# this from the repo root; base sends the build into apps/console. The Next
# adapter plugin is installed by Netlify (not vendored locally) and deploys the
# SSR functions, which a manual CLI deploy cannot. No em-dashes.
[build]
  base = "apps/console"
  command = "npm run build"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=4096"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
